[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions."scan-market"]
  timeout = 26

[functions."scheduled-scan"]
  schedule = "0 */4 * * *"

[functions."weekly-review"]
  schedule = "0 8 * * 1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
